<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>

<h1>Student Management System</h1>

<a href="/add/">Add Student</a>

<br><br>

<table border="1">
<tr>
    <th>Name</th>
    <th>Roll No</th>
    <th>Email</th>
    <th>Department</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.roll_no }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.department }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
